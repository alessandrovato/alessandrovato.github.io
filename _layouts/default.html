<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | BCIReahb Lab</title>
    
    <style>
        /* 1. VARIABLES (CUA RED THEME) */
        :root {
            --nav-width: 260px;
            --bg-color: #f4f4f4;
            --sidebar-color: #1a252f;
            --accent: #A6192E; /* CUA Red */
            --card-bg: #ffffff;
        }

        /* 2. CORE LAYOUT */
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-color);
            color: #333;
        }

        /* 3. SIDEBAR STYLES */
        nav {
            width: var(--nav-width);
            height: 100vh;
            background: var(--sidebar-color);
            color: white;
            position: fixed;
            display: flex;
            flex-direction: column;
            padding: 40px 0;
            box-sizing: border-box;
            z-index: 100;
        }
        nav-profile {
            text-align: center;
            padding-bottom: 30px;
            border-bottom: 1px solid #34495e;
            margin-bottom: 20px;
        }

        .nav-profile h2 { margin: 0; font-size: 1.4rem; color: #fff; }
        .nav-profile p { font-size: 0.8rem; opacity: 0.7; margin-top: 5px; }

        nav a {
            color: #ecf0f1;
            text-decoration: none;
            padding: 15px 30px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background: #2c3e50;
            color: var(--accent); /* CUA Red highlight */
            padding-left: 40px;
        }

        /* 4. MAIN CONTENT AREA */
        main {
            margin-left: var(--nav-width);
            width: 100%;
            max-width: 1000px;
            padding: 60px;
        }

        /* 5. REUSABLE CARD STYLES */
        .bci-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            line-height: 1.8;
            border-left: 4px solid var(--accent);
            margin-bottom: 20px;
        }

        /* Add your mobile media queries here from previous steps */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav { width: 100%; height: auto; position: static; }
            main { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    {% include nav.html %}

    <main>
        {{ content }}
    </main>

</body>
</html>
