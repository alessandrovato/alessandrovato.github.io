    <script>
        const observerOptions = {
            threshold: 0.2 // Trigger when 20% of the item is visible
        };
    
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                }
            });
        }, observerOptions);
    
        // Tell the observer to watch all timeline items
        document.querySelectorAll('.v-timeline-item').forEach((item) => {
            observer.observe(item);
        });
    </script>


<script>
document.addEventListener("DOMContentLoaded", function () {

    const items = document.querySelectorAll("#news .v-timeline-item");
    if (items.length === 0) return;

    const latest = Array.from(items).slice(0, 4);
    const list = document.getElementById("latest-news-text");

    latest.forEach(item => {
        const date  = item.querySelector(".v-timeline-date")?.textContent || "";
        const title = item.querySelector("h4")?.textContent || "";
        const text  = item.querySelector("p")?.textContent || "";

        const li = document.createElement("li");
        li.innerHTML = `
            <span class="v-timeline-date">${date}</span>
            — <strong>${title}</strong>: ${text}
        `;

        list.appendChild(li);
    });
});
</script>




<!-- script for publications -->


<script src="https://cdn.jsdelivr.net/npm/bibtex-js-parser/build/bibtexParse.min.js"></script>

<script>
async function loadPublications() {
  try {

    const response = await fetch("publications.bib");

    if (!response.ok) {
      throw new Error("Cannot load publications.bib");
    }

    const bibtexText = await response.text();

    console.log(bibtexText);

    const entries = bibtexParse.toJSON(bibtexText);

    entries.sort((a, b) => {
      return (b.entryTags.year || 0) - (a.entryTags.year || 0);
    });

    const pubList = document.getElementById("pub-list");

    pubList.innerHTML = "";

    entries.forEach(entry => {

      const tags = entry.entryTags;

      const title = tags.title || "Untitled";
      const authors = tags.author || "";
      const year = tags.year || "";
      const journal = tags.journal || tags.booktitle || "";
      const doi = tags.doi || "";

      const div = document.createElement("div");
      div.className = "publication-card";

      div.innerHTML = `
        <h3>${title}</h3>

        <p class="pub-authors">
          ${authors}
        </p>

        <p class="pub-journal">
          <em>${journal}</em> (${year})
        </p>

        <div class="pub-links">
          ${doi ? `<a href="https://doi.org/${doi}" target="_blank">DOI</a>` : ""}
        </div>
      `;

      pubList.appendChild(div);
    });

  } catch(error) {

    console.error(error);

    document.getElementById("pub-list").innerHTML = `
      <p style="color:red;">
        Error loading publications.
      </p>
    `;
  }
}

loadPublications();
</script>
